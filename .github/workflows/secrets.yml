name: Secret Scan2

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        id: gitleaks
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            zricethezav/gitleaks:latest \
            detect \
              --source=/repo \
              --report-format=sarif \
              --report-path=/repo/gitleaks.sarif \
              --redact \
              --verbose \
              --exit-code=1

      - name: TruffleHog scan
        id: trufflehog
        continue-on-error: true
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            trufflesecurity/trufflehog:latest \
            git file:///repo \
              --only-verified \
              --fail \
              --json > trufflehog.json

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-reports
          path: |
            gitleaks.sarif
            trufflehog.json
          if-no-files-found: ignore

      - name: Gate on scanner results (blocking)
        if: always()
        run: |
          echo "Gitleaks:   ${{ steps.gitleaks.outcome }}"
          echo "TruffleHog: ${{ steps.trufflehog.outcome }}"
          if [ "${{ steps.gitleaks.outcome }}" = "failure" ] || \
             [ "${{ steps.trufflehog.outcome }}" = "failure" ]; then
            echo "::error::Secret Scan failed — secret(s) detected in repository"
            exit 1
          fi
